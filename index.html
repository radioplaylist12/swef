<meta charset="UTF-8">

<title>TV Cast - Canais para Web Video Caster</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        background: #0a0a0a;
        color: #fff;
        padding: 20px;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
    }

    h1 {
        text-align: center;
        margin-bottom: 10px;
        font-size: 1.8rem;
        color: #00f3ff;
    }

    .sub {
        text-align: center;
        color: #888;
        margin-bottom: 30px;
        font-size: 0.9rem;
    }

    /* Barra de busca */
    .search-box {
        margin-bottom: 30px;
    }

    .search-box input {
        width: 100%;
        padding: 14px 20px;
        border-radius: 50px;
        border: 1px solid #333;
        background: #1a1a1a;
        color: #fff;
        font-size: 16px;
        outline: none;
    }

    .search-box input:focus {
        border-color: #00f3ff;
    }

    /* Grid de canais */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 15px;
    }

    /* Card do canal - ESTILO ESPECIAL PARA WEB CASTER */
    .channel-card {
        background: #121212;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid #222;
        transition: transform 0.2s, border-color 0.2s;
    }

    .channel-card:hover {
        transform: translateY(-3px);
        border-color: #00f3ff;
    }

    .channel-info {
        padding: 15px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid #1e1e1e;
    }

    .channel-logo {
        width: 48px;
        height: 48px;
        background: #1e1e1e;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
    }

    .channel-name {
        flex: 1;
    }

    .channel-name h3 {
        font-size: 1.1rem;
        margin-bottom: 4px;
    }

    .channel-name .category {
        font-size: 0.7rem;
        color: #00f3ff;
        opacity: 0.7;
    }

    /* BOTÕES ESPECIAIS PARA WEB CASTER */
    .cast-buttons {
        padding: 12px;
        display: flex;
        gap: 10px;
    }

    .btn-cast {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 40px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 14px;
        transition: all 0.2s;
    }

    .btn-cast-primary {
        background: #00f3ff;
        color: #000;
    }

    .btn-cast-primary:hover {
        background: #00d4e0;
        transform: scale(1.02);
    }

    .btn-cast-secondary {
        background: #2a2a2a;
        color: #fff;
        border: 1px solid #444;
    }

    .btn-cast-secondary:hover {
        background: #3a3a3a;
    }

    /* Link direto (escondido mas acessível) */
    .direct-link {
        padding: 10px 12px;
        background: #0a0a0a;
        font-size: 11px;
        color: #555;
        border-top: 1px solid #1e1e1e;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .direct-link span {
        font-family: monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 200px;
    }

    .copy-link {
        background: none;
        border: none;
        color: #666;
        cursor: pointer;
        font-size: 12px;
        padding: 4px 8px;
        border-radius: 8px;
    }

    .copy-link:hover {
        background: #1e1e1e;
        color: #00f3ff;
    }

    .toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: #00f3ff;
        color: #000;
        padding: 10px 20px;
        border-radius: 30px;
        font-weight: bold;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 1000;
    }

    .toast.show {
        opacity: 1;
    }

    footer {
        text-align: center;
        margin-top: 40px;
        padding: 20px;
        color: #555;
        font-size: 12px;
    }

    @media (max-width: 600px) {
        body {
            padding: 10px;
        }
        .btn-cast {
            padding: 10px;
            font-size: 12px;
        }
    }
</style>

// ============================================
// FUNÇÕES PRINCIPAIS
// ============================================

function renderChannels(filter = "") {
    const grid = document.getElementById("channelsGrid");
    if (!grid) return;
    
    const filtered = channels.filter(ch => 
        ch.name.toLowerCase().includes(filter.toLowerCase()) ||
        ch.category.toLowerCase().includes(filter.toLowerCase())
    );
    
    grid.innerHTML = filtered.map(ch => `
        <div class="channel-card" data-name="${ch.name.toLowerCase()}">
            <div class="channel-info">
                <div class="channel-logo">${ch.logo}</div>
                <div class="channel-name">
                    <h3>${ch.name}</h3>
                    <div class="category">${ch.category}</div>
                </div>
            </div>
            <div class="cast-buttons">
                <button class="btn-cast btn-cast-primary" onclick="castToTV('${ch.url}', '${ch.name}')">
                    📡 Enviar para TV
                </button>
                <button class="btn-cast btn-cast-secondary" onclick="openInBrowser('${ch.url}')">
                    📱 Abrir
                </button>
            </div>
            <div class="direct-link">
                <span>🔗 ${ch.url.replace('https://', '')}</span>
                <button class="copy-link" onclick="copyLink('${ch.url}')">📋 Copiar</button>
            </div>
        </div>
    `).join("");
}

// FUNÇÃO PRINCIPAL PARA WEB VIDEO CASTER
function castToTV(url, channelName) {
    // Método 1: Tentar abrir diretamente no Web Video Caster
    const webCasterIntent = `webvideocaster://open?url=${encodeURIComponent(url)}`;
    
    // Método 2: URL universal para compatibilidade
    const universalUrl = `https://www.webvideocaster.com/open?url=${encodeURIComponent(url)}`;
    
    // Tenta abrir o app primeiro
    window.location.href = webCasterIntent;
    
    // Fallback: se não abrir, mostra instruções
    setTimeout(() => {
        showToast(`📺 ${channelName} - Abra no Web Video Caster e cole o link`, 3000);
    }, 500);
    
    // Salva no localStorage para fácil acesso
    localStorage.setItem("lastChannel", url);
}

function openInBrowser(url) {
    window.open(url, "_blank");
}

function copyLink(url) {
    navigator.clipboard.writeText(url).then(() => {
        showToast("✅ Link copiado! Cole no Web Video Caster", 1500);
    });
}

function filterChannels() {
    const search = document.getElementById("searchInput").value;
    renderChannels(search);
}

function showToast(message, duration = 2000) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.classList.add("show");
    setTimeout(() => {
        toast.classList.remove("show");
    }, duration);
}

// Detectar se está no Web Video Caster (opcional)
function detectWebCaster() {
    const ua = navigator.userAgent.toLowerCase();
    if (ua.includes("webvideocaster")) {
        showToast("📺 Web Video Caster detectado! Clique em Enviar para TV");
    }
}

// Inicializar
renderChannels();
detectWebCaster();
